---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: executor
  namespace: aegis
  labels: { app: executor }
spec:
  replicas: 1
  selector: { matchLabels: { app: executor } }
  template:
    metadata:
      labels: { app: executor }
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 10001 }
      containers:
        - name: executor
          image: aegis:latest
          command: ["python", "-m", "aegis_services.action_executor.worker"]
          envFrom:
            - configMapRef: { name: aegis-config }
            - secretRef: { name: aegis-secrets }
          env:
            - { name: AEGIS_SERVICE_NAME, value: "executor" }
            - name: AUTONOMY_MODE
              valueFrom: { configMapKeyRef: { name: aegis-killswitch, key: AUTONOMY_MODE } }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1", memory: "1Gi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
