---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: detection
  namespace: aegis
  labels: { app: detection }
spec:
  replicas: 2
  selector: { matchLabels: { app: detection } }
  template:
    metadata:
      labels: { app: detection }
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 10001 }
      containers:
        - name: detection
          image: aegis:latest
          command: ["python", "-m", "aegis_services.detection.worker"]
          envFrom:
            - configMapRef: { name: aegis-config }
            - secretRef: { name: aegis-secrets }
          env:
            - { name: AEGIS_SERVICE_NAME, value: "detection" }

          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1", memory: "1Gi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
