apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: aegis
# Application manifests for Aegis (ADR-011 cloud-agnostic, Kubernetes-first).
# Backing infra (Postgres, Redis, Kafka, Qdrant, OTel) is provisioned separately via
# operators/Helm or Terraform modules and referenced by aegis-config (architecture §15).
resources:
  - namespace.yaml
  - configmap.yaml
  - killswitch.yaml
  - secret.example.yaml
  - networkpolicy.yaml
  - deployments-web.yaml
  - deployments-workers.yaml
  - hpa.yaml
images:
  - name: aegis
    newTag: latest
