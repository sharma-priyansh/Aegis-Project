---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion
  namespace: aegis
  labels: { app: ingestion }
spec:
  replicas: 2
  selector: { matchLabels: { app: ingestion } }
  template:
    metadata:
      labels: { app: ingestion }
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 10001, fsGroup: 10001 }
      containers:
        - name: ingestion
          image: aegis:latest
          command: ["python", "-m", "aegis_services.ingestion_gateway.app"]
          ports: [{ containerPort: 8001 }]
          envFrom:
            - configMapRef: { name: aegis-config }
            - secretRef: { name: aegis-secrets }
          env:
            - { name: PORT, value: "8001" }
            - { name: AEGIS_SERVICE_NAME, value: "ingestion" }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1", memory: "1Gi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          readinessProbe:
            httpGet: { path: /healthz, port: 8001 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8001 }
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion
  namespace: aegis
spec:
  selector: { app: ingestion }
  ports: [{ port: 8001, targetPort: 8001 }]
