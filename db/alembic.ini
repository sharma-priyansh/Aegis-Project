# Alembic config for Aegis migrations (ADR-012).
# DSN is injected from AEGIS_POSTGRES_DSN at runtime (see migrations/env.py),
# falling back to the local docker-compose default.
[alembic]
script_location = db/migrations
prepend_sys_path = src
sqlalchemy.url = postgresql+asyncpg://aegis:aegis@localhost:5432/aegis

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
