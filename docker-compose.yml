# Aegis — local development infrastructure.
# Brings up the full backing-store + observability stack for local runs.
# Application services live under ./services and are run via `make run-*` or their own profiles.
#
# Usage:
#   docker compose up -d            # infra only (postgres, redis, kafka, qdrant, otel, jaeger)
#   docker compose --profile models up -d   # also start Ollama (heavy)
#   docker compose --profile app up -d --build   # also build+run Aegis services
#
# ADR refs: ADR-002 (Kafka), ADR-008 (Qdrant), ADR-011 (cloud-agnostic), ADR-019 (Aegis isolation).

name: aegis

x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc

networks:
  aegis:
    driver: bridge

volumes:
  pgdata:
  qdrantdata:
  ollamadata:

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
      POSTGRES_DB: aegis
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegis"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [aegis]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [aegis]

  # Single-node Kafka in KRaft mode (no ZooKeeper). For local dev only.
  kafka:
    image: apache/kafka:3.8.0
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: 6
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [aegis]

  # One-shot: create the Aegis topics with correct partition keys (ADR-002/009/018).
  kafka-init:
    image: apache/kafka:3.8.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/scripts/create-topics.sh"]
    volumes:
      - ./deploy/local/create-topics.sh:/scripts/create-topics.sh:ro
    networks: [aegis]
    restart: "no"

  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports: ["6333:6333", "6334:6334"]
    volumes: ["qdrantdata:/qdrant/storage"]
    networks: [aegis]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./deploy/local/otel-collector.yaml:/etc/otel/config.yaml:ro
    ports: ["4317:4317", "4318:4318"]
    depends_on: [jaeger]
    networks: [aegis]

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports: ["16686:16686"]   # Jaeger UI
    networks: [aegis]

  # Optional, heavy: open-source LLM/embeddings runtime (ADR-010). Not needed for the Phase-1 spine.
  ollama:
    image: ollama/ollama:0.3.14
    profiles: ["models"]
    ports: ["11434:11434"]
    volumes: ["ollamadata:/root/.ollama"]
    networks: [aegis]
